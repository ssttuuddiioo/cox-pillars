<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
  <title>Cox Conserves</title>
  <link rel="stylesheet" href="../shared/css/brand.css">
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app-frame">

  <!-- Radial leaf burst: blurred 2x background (visible on menu/content) -->
  <canvas id="radial-bg" class="radial-canvas radial-bg"></canvas>

  <!-- ===== SCREEN 1: IDLE / HOME ===== -->
  <div id="screen-idle" class="screen active">
    <!-- Top: Headline + Logo -->
    <div class="idle-top">
      <h1 class="idle-headline" id="idle-headline"></h1>
      <div class="idle-logo">
        <img src="assets/logo.svg" alt="Cox Conserves" class="idle-logo-img">
      </div>
    </div>

    <!-- Middle: Radial leaf burst animation -->
    <div class="idle-illustration" id="idle-illustration">
      <canvas id="radial-fg" class="radial-canvas radial-fg"></canvas>
    </div>

    <!-- Bottom: CTA bar -->
    <div class="idle-cta" id="idle-cta">
      <img src="assets/tap_1.svg" alt="" class="idle-cta-hand">
      <div class="idle-cta-labels">
        <span class="idle-cta-prefix">TAP THE SCREEN TO</span>
        <span class="idle-cta-text" id="idle-cta-text"></span>
      </div>
      <img src="assets/arrow_1.svg" alt="" class="idle-cta-circle">
    </div>
  </div>

  <!-- ===== SCREEN 2: MENU ===== -->
  <div id="screen-menu" class="screen">
    <div class="menu-logo">
      <img src="assets/logo.svg" alt="Cox Conserves" class="menu-logo-img">
    </div>
    <div class="menu-items" id="menu-items">
      <!-- Populated by JS: one card per content item -->
    </div>
  </div>

  <!-- ===== SCREEN 3: CONTENT PAGE ===== -->
  <div id="screen-content" class="screen">
    <div class="content-logo">
      <img src="assets/logo.svg" alt="Cox Conserves" class="content-logo-img">
    </div>
    <div class="content-scroll">
      <div class="content-card">
        <div class="content-hero" id="content-hero">
          <!-- Video or image inserted dynamically -->
        </div>
        <div class="content-thumbnails" id="content-thumbnails">
          <!-- Thumbnail gallery below hero -->
        </div>
        <h2 class="content-title" id="content-title"></h2>
        <div class="content-body" id="content-body"></div>
        <!-- Navigation bar inside card, pinned at bottom -->
        <nav class="content-nav" id="content-nav">
          <button class="nav-btn nav-prev" id="nav-prev" aria-label="Previous">
            <img src="assets/nav-back.svg" alt="">
          </button>
          <button class="nav-btn nav-home" id="nav-home" aria-label="Menu">
            <img src="assets/nav-menu.svg" alt="">
          </button>
          <button class="nav-btn nav-next" id="nav-next" aria-label="Next">
            <img src="assets/nav-next.svg" alt="">
          </button>
        </nav>
      </div>
    </div>
  </div>

</div><!-- /app-frame -->

<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<script src="js/radial.js" defer></script>
<script src="js/content-loader.js" defer></script>
<script src="js/main.js" defer></script>
</body>
</html>
